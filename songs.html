<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌曲名称 - 在线听歌</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>
    <div class="menu-wrapper">
        <!-- 左侧菜单 -->
        <aside class="left-menu">
            <div class="menu-logo">在线听歌</div>
            <nav class="menu-list">
                <a href="menu.html" class="menu-link">首页</a>
                <a href="songs.html" class="menu-link active">歌曲名称</a>
                <a href="singers.html" class="menu-link">歌手</a>
                <a href="rank.html" class="menu-link">排行榜</a>
                <a href="favorite.html" class="menu-link">我的喜欢</a>
                <a href="mine.html" class="menu-link">我的</a>
            </nav>
            <div class="back-to-home">
                <a href="mainpage.html">← 返回主页</a>
            </div>
        </aside>

        <!-- 右侧内容区 -->
        <main class="right-content">
            <div class="page-background" id="songs-bg"></div>
            <div class="content-wrapper">
                <h1 class="page-title">歌曲名称</h1>
                <div class="page-body">
                    <!-- 搜索和筛选区 -->
                    <div class="search-filter-section">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="搜索歌曲或歌手名称...">
                            <button id="searchBtn">🔍 搜索</button>
                        </div>
                        
                        <div class="filter-box">
                            <label>按类型筛选:</label>
                            <select id="genreFilter">
                                <option value="">全部类型</option>
                            </select>
                        </div>
                    </div>

                    <!-- 统计信息 -->
                    <div class="stats-bar">
                        <span>找到 <span id="songCount">0</span> 首歌曲</span>
                        <span id="sortOptions">
                            <button class="sort-btn active" data-sort="default">默认</button>
                            <button class="sort-btn" data-sort="popular">最热</button>
                            <button class="sort-btn" data-sort="year">最新</button>
                        </span>
                    </div>

                    <!-- 歌曲列表 -->
                    <div class="songs-container">
                        <div class="songs-list" id="songsList"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 音乐播放器 -->
    <div class="music-player" id="musicPlayer" style="display: none;">
        <div class="player-main">
            <div class="player-info">
                <div class="player-icon">♫</div>
                <div class="player-details">
                    <div class="player-song-name" id="playerSongName">选择歌曲播放</div>
                    <div class="player-singer-name" id="playerSingerName">歌手名称</div>
                </div>
            </div>

            <div class="player-controls">
                <button class="player-btn prev-btn" title="上一首">⏮</button>
                <button class="player-btn play-btn" title="播放/暂停">▶</button>
                <button class="player-btn next-btn" title="下一首">⏭</button>
            </div>

            <div class="player-progress">
                <span class="current-time">00:00</span>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <span class="duration">00:00</span>
            </div>

            <div class="player-volume">
                <button class="player-btn volume-btn" title="静音">🔊</button>
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.7" title="音量">
                <button class="player-btn close-btn" title="关闭">✕</button>
            </div>
        </div>
    </div>

    <script src="js/menu.js"></script>
    <script src="js/music-data.js"></script>
    <script src="js/player-config.js"></script>
    <script src="js/player.js"></script>
    <script src="js/favorite.js"></script>
    <script src="js/songs.js"></script>
</body>
</html>
