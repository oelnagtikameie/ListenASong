<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌手 - 在线听歌</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>
    <div class="menu-wrapper">
        <!-- 左侧菜单 -->
        <aside class="left-menu">
            <div class="menu-logo">在线听歌</div>
            <nav class="menu-list">
                <a href="menu.html" class="menu-link">首页</a>
                <a href="songs.html" class="menu-link">歌曲名称</a>
                <a href="singers.html" class="menu-link active">歌手</a>
                <a href="rank.html" class="menu-link">排行榜</a>
                <a href="favorite.html" class="menu-link">我的喜欢</a>
                <a href="mine.html" class="menu-link">我的</a>
            </nav>
            <div class="back-to-home">
                <a href="mainpage.html">← 返回主页</a>
            </div>
        </aside>

        <!-- 右侧内容区 -->
        <main class="right-content">
            <div class="page-background" id="singers-bg"></div>
            <div class="content-wrapper">
                <h1 class="page-title">歌手</h1>
                <div class="page-body">
                    <!-- 搜索框 -->
                    <div class="search-filter-section">
                        <div class="search-box">
                            <input type="text" id="singerSearchInput" placeholder="搜索歌手名称...">
                            <button id="singerSearchBtn">🔍 搜索</button>
                        </div>
                    </div>

                    <!-- 统计信息 -->
                    <div class="stats-bar">
                        <span>共有 <span id="singerCount">0</span> 位歌手</span>
                    </div>

                    <!-- 歌手列表 -->
                    <div class="singers-container">
                        <div class="singers-grid" id="singersList"></div>
                    </div>

                    <!-- 歌手详情面板（点击歌手时显示） -->
                    <div class="singer-detail-panel" id="singerDetailPanel" style="display: none;">
                        <div class="detail-panel-content">
                            <button class="close-btn" onclick="closeSingerDetail()">×</button>
                            
                            <div class="singer-detail-header">
                                <div class="detail-avatar">
                                    <div class="avatar-placeholder" id="detailAvatar"></div>
                                </div>
                                <div class="detail-info">
                                    <h2 id="detailName"></h2>
                                    <p id="detailIntro"></p>
                                    <div class="detail-stats">
                                        <div class="stat">
                                            <span class="stat-label">类型:</span>
                                            <span class="stat-value" id="detailGenre"></span>
                                        </div>
                                        <div class="stat">
                                            <span class="stat-label">歌曲数:</span>
                                            <span class="stat-value" id="detailWorks"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 该歌手的歌曲列表 -->
                            <div class="singer-songs">
                                <h3>该歌手的歌曲</h3>
                                <div class="songs-list" id="singerSongsList"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/menu.js"></script>
    <script src="js/music-data.js"></script>
    <script src="js/singers.js"></script>
</body>
</html>
