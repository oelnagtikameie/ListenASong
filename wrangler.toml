name = "简版网页"
type = "javascript"
account_id = ""
workers_dev = true
route = ""
zone_id = ""

# Cloudflare Pages 配置
pages_build_output_dir = "."

[env.production]
name = "简版网页-production"

[build]
# 不需要构建步骤，直接部署静态文件
command = ""
cwd = "./."
watch_paths = ["src/**/*.rs"]

[build.upload]
format = "service-worker"

# 环境变量
[env.production.vars]
ENVIRONMENT = "production"
