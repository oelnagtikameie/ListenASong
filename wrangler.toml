# Cloudflare Pages 项目配置
name = "simple-music-player"

# 发布目录（根目录为部署源）
pages_build_output_dir = "."

# 构建配置（Pages 请留空）
[build]
command = ""

# 环境变量配置
[env.production]
name = "simple-music-player-production"
vars = { ENVIRONMENT = "production" }

[env.development]  
name = "simple-music-player-dev"
vars = { ENVIRONMENT = "development" }
